name: Kennelcost
options:
  bundleIdPrefix: com.shimondeitel.petboarding
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Kennelcost:
    type: application
    platform: iOS
    sources:
      - path: Kennelcost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petboarding
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Kennelcost/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  KennelcostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KennelcostTests
      - path: Kennelcost.storekit
    dependencies:
      - target: Kennelcost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petboarding.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  KennelcostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KennelcostUITests
    dependencies:
      - target: Kennelcost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petboarding.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Kennelcost:
    build:
      targets:
        Kennelcost: all
        KennelcostTests: [test]
        KennelcostUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Kennelcost.storekit
    test:
      config: Debug
      storeKitConfiguration: Kennelcost.storekit
      targets:
        - KennelcostTests
        - KennelcostUITests
    archive:
      config: Release
